User tinyproxy
Group tinyproxy

Port 8888
Listen 0.0.0.0
BindSame No
Timeout 120
DefaultErrorFile "/usr/share/tinyproxy/default.html"
LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Info
PidFile "/run/tinyproxy.pid"

MaxClients 20
MinSpareServers 2
MaxSpareServers 5
StartServers 2
MaxRequestsPerChild 0

# Only allow CONNECT to HTTPS ports. Postgres goes through the separate
# db-tunnel sidecar (libpq doesn't honour HTTP_PROXY), so 5432 is NOT here.
ConnectPort 443

# Allowlist only: any destination not matching /etc/tinyproxy/filter is denied.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterCaseSensitive No
FilterExtended On

# Deny by default for DIRECT (non-CONNECT) requests too — review container
# should only ever speak HTTPS to allowlisted hosts.
FilterURLs Off

# Disable the ViaHeader so we don't leak intermediary info.
DisableViaHeader Yes
